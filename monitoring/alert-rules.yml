# Prometheus Alert Rules
# Defines alerts based on metrics thresholds

groups:
  - name: lumenshake-alerts
    rules:
      # High Error Rate
      - alert: HighErrorRate
        expr: rate(application_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors/sec for the last 5 minutes"

      # Slow Response Times
      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_ms_bucket[5m])) > 2000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response times"
          description: "95th percentile response time is {{ $value }}ms"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: nodejs_heap_size_used_bytes / nodejs_heap_size_total_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Node.js heap usage is {{ $value | humanizePercentage }}"

      # Service Down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} down"
          description: "{{ $labels.instance }} has been down for more than 1 minute"

      # Webhook Delivery Failures
      - alert: HighWebhookFailureRate
        expr: sum(rate(webhook_deliveries_total{success="false"}[5m])) / sum(rate(webhook_deliveries_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High webhook failure rate"
          description: "Webhook failure rate is {{ $value | humanizePercentage }}"

      # Database Connection Pool Exhaustion
      - alert: DatabaseConnectionPoolExhausted
        expr: db_connection_pool_size{status="active"} / db_connection_pool_size{status="total"} > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "{{ $value | humanizePercentage }} of database connections in use"

      # SEP-10 Authentication Failures
      - alert: HighAuthFailureRate
        expr: sum(rate(sep10_auth_attempts_total{success="false"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High SEP-10 authentication failure rate"
          description: "{{ $value }} auth failures per second"

      # MoneyGram Transaction Failures
      - alert: MoneyGramTransactionFailures
        expr: rate(moneygram_transactions_total{status="failed"}[5m]) > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "MoneyGram transaction failures"
          description: "MoneyGram failure rate is {{ $value }} failures/sec"

      # Disk Space Low
      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Disk space is {{ $value | humanizePercentage }} available"

      # CPU Usage High
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for 10 minutes"
