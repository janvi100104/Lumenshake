<!DOCTYPE html>
<html>
<head>
    <title>Simple SEP-10 Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk@15/stellar-sdk.min.js"></script>
</head>
<body style="font-family: monospace; padding: 20px;">
    <h1>Simple SEP-10 Test</h1>
    <div id="output"></div>
    
    <script>
        const { Keypair, TransactionBuilder, Networks } = StellarSdk;
        const API_URL = 'http://localhost:4000/api';
        
        async function runTest() {
            const output = document.getElementById('output');
            output.innerHTML = '<h3>Starting test...</h3>';
            
            try {
                // Step 1: Generate account
                output.innerHTML += '<p>1. Generating account...</p>';
                const keypair = Keypair.random();
                const publicKey = keypair.publicKey();
                output.innerHTML += `<p>Account: ${publicKey}</p>`;
                
                // Step 2: Fund it
                output.innerHTML += '<p>2. Funding with friendbot...</p>';
                await fetch(`https://friendbot.stellar.org?addr=${publicKey}`);
                output.innerHTML += '<p>✅ Funded</p>';
                
                // Step 3: Get challenge
                output.innerHTML += '<p>3. Getting challenge...</p>';
                const resp1 = await fetch(`${API_URL}/auth/challenge?account=${publicKey}`);
                const data1 = await resp1.json();
                
                if (!resp1.ok) {
                    throw new Error(data1.message);
                }
                
                output.innerHTML += `<p>✅ Got challenge (${data1.transaction.length} chars)</p>`;
                output.innerHTML += `<p>Network: ${data1.network_passphrase}</p>`;
                
                // Step 4: Sign with SDK v15
                output.innerHTML += '<p>4. Signing transaction...</p>';
                const tx = TransactionBuilder.fromXDR(data1.transaction, Networks.TESTNET);
                tx.sign(keypair);
                const signedXdr = tx.toXDR();
                output.innerHTML += `<p>✅ Signed (${signedXdr.length} chars)</p>`;
                
                // Step 5: Verify
                output.innerHTML += '<p>5. Verifying...</p>';
                const resp2 = await fetch(`${API_URL}/auth/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ transaction: signedXdr })
                });
                const data2 = await resp2.json();
                
                if (!resp2.ok) {
                    throw new Error(data2.message);
                }
                
                output.innerHTML += '<h2 style="color: green;">✅ SUCCESS!</h2>';
                output.innerHTML += `<p>JWT Token: ${data2.token}</p>`;
                output.innerHTML += `<p>Account: ${data2.account}</p>`;
                
            } catch (error) {
                output.innerHTML += `<h2 style="color: red;">❌ FAILED</h2>`;
                output.innerHTML += `<p>Error: ${error.message}</p>`;
                console.error(error);
            }
        }
        
        // Run on load
        runTest();
    </script>
</body>
</html>
